[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "content-quality-spine"
version = "1.1.0"
description = "SourceA shared content-quality spine — portable pre-generation firewall"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
content-quality-spine = "content_quality_spine.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["content_quality_spine*"]

[tool.setuptools.package-data]
content_quality_spine = ["rules/*.json"]
