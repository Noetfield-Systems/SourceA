<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Pro</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="shell">
    <aside class="rail">
      <div class="brand">
        Agent Pro
        <small>Composer · Inbox · Session</small>
      </div>
      <button type="button" data-view="inbox" class="active">Inbox</button>
      <button type="button" data-view="session">Agent session</button>
      <p class="live-dot" id="live">Live · offline</p>
    </aside>
    <div class="workspace">
      <header class="topbar">
        <h1 id="title">Inbox</h1>
        <div class="chips" id="chips"></div>
      </header>
      <div class="body single" id="workspace">
        <div id="main"></div>
      </div>
    </div>
  </div>
  <script src="/app.js" defer></script>
</body>
</html>
