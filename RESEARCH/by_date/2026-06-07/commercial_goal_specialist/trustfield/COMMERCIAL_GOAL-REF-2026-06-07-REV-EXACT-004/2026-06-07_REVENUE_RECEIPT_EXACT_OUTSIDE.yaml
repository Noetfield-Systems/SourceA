money_chain_map:
  description: Where dollars move in proven Canadian fintech stacks
  chain:
    - step: 1
      actor: End business or consumer
      pays: subscription and/or per-transaction fees
    - step: 2
      actor: Program operator (Plooto customer / embedded finance startup)
      pays: platform fee to orchestration or compliance vendor
    - step: 3
      actor: Orchestration vendor (VoPay / Invincible / TrustField target slot)
      earns: setup + platform + usage OR rev-share
    - step: 4
      actor: Rail or venue (VoPay EFT / PayTrie on-ramp / NDAX execution)
      earns: transaction spread or rail fees
    - step: 5
      actor: Regulator (Bank of Canada)
      collects: CAD 2,500 registration + annual assessment

