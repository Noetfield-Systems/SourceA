universal_pattern_locked:
  lead_with: buyer_problem_not_founder_solution
  product_visible: within_2_seconds_of_landing
  primary_cta_count: 1
  design_signals:
    - serious
    - nothing_to_hide
    - product_speaks_for_itself
  reject:
    - stock_photos
    - we_are_the_stripe_of_x
    - architecture_diagrams_on_hero
    - multiple_equal_ctas

golden_suggestion_one_line: >
  Build three surfaces that look like Vanta's fear-to-proof loop for compliance buyers,
  Linear's product-first restraint for product credibility, and Resend's code-snippet
  confidence for developers — with Noetfield messaging borrowed from Credo's
  "Measurable Trust" and TrustField from Vanta/Drata's continuous evidence posture.

brand_mapping:
  trustfield_ca:
    chain_seat: between Comply North fixed-fee prep and Comply+ filing SaaS
    reference_primary: [vanta, drata, stripe]
    reference_secondary: [resend, vercel]
    lead_sku: TF-P1
    primary_cta: /demo
    pricing_page: /pilot_only
    hero_fear: RPAA application deadline + FINTRAC enforcement + spreadsheet audit failure
    hero_proof: live sandbox /trade + evidence pack sample + 6-week pilot timeline
    never: architecture_diagram_hero, multi_brand_merge, msb_before_3_demos
  noetfield_com:
    chain_seat: below Securiti/OneTrust above free ISED docs
    reference_primary: [credo, vanta]
    reference_secondary: [anthropic, plain]
    offerings_count: 3
    lead_sku: NF-RD
    primary_cta: /trust-brief/intake/
    hero_fear: Copilot deployment will be asked for audit trail later — before regulators not after
    hero_proof: policy pack preview + NIST/EU AI RMF mapping table + Trust Brief sample
    language: Measurable Trust continuous governance — not generic responsible AI fluff
  sourcea_internal:
    public_site: false
    reference_primary: [anthropic, linear]
    reference_secondary: [supabase, plain]
    role: governed_execution_os_not_marketing_homepage
    investor_narrative: receipt_on_disk + event_chain + semi_auto_L1 — understating like Anthropic
    do_not: clone_vanta_homepage_for_sourcea

implementation_phases:
  phase_0_dual_p0:
    factory: sustained AUTO-RUN Kill #6
    commercial: TF-001 deposit or NF-001 design partner
    site_work: parallel_not_substitute
  phase_1_trustfield_hero:
    deliverable: fear-first hero + /demo single CTA + /trade visible in first scroll
    freeze: no new product features until 3 demo calls
  phase_2_noetfield_copilot:
    deliverable: Cred-style governance pack page + QuickScan/Pilot tiers visible
    invoicing: TrustField seller_of_record
  phase_3_proof_layer:
    deliverable: trust_center_style evidence samples (static PDF/mock until live)
    semantic_memory: P1 after AUTH-LIVE

hero_templates:
  trustfield:
    headline: "When FINTRAC asks, you need receipts — not spreadsheets."
    subhead: "6-week RPAA Readiness Pilot. Evidence packs, sandbox demos, path to registration."
    cta_primary: "Book a demo"
    cta_secondary_forbidden_on_hero: true
  noetfield:
    headline: "Your Copilot rollout will be audited. Build the trail now."
    subhead: "Governance packs and Trust Briefs for teams deploying Microsoft 365 Copilot in regulated environments."
    cta_primary: "Request Governance Brief"
  trustfield_developers:
    pattern: resend_stripe
    element: api_snippet_or_sandbox_embed
    page: /developers

