autonomy_claims_vs_reality:
  industry_pattern: "All studied players overstate end-to-end autonomy in marketing relative to measured/task-scoped reality."
  devin_delta: "Claim: autonomous SWE. Reality: low double-digit  %; independent 15% task success; unpredictable on ambiguous work."
  lovable_delta: "Claim: production-ready. Reality: strong MVP speed; security/scale/compliance need human engineering."
  cursor_delta: "Claim: self-driving codebases. Reality: high internal agent PR share for mature eng orgs; requires VM env + review; not SMB business automation."
  rais_class_delta: "Claim: transform business with AI. Reality: human-led scoping/delivery; bounded automations; retainer-dependent."
  canada_smb_delta: "Claim: AI everywhere. Reality: adoption accelerating but governance/skills lag; micro-SMB widening gap vs larger firms."

gaps:
  - gap: "No  exposes a three-role advocate model (commercial + governance + external research) with sole execution authority — market sells monolithic product or agency hours."
    implication: "Controlled Execution OS cognitive separation is differentiated if surfaced as buyer trust, not internal jargon."
    severity: strategic

  - gap: " ship cloud sandboxes and MCP-native tool loops; our OS is semi-auto Level 1 with dispatch_ready=false and eval gates — honesty is strength but autonomy parity lags Devin/Cursor-class harness maturity."
    implication: "Execution maturity (Eval-1b, worker routing) is the  catch-up vector, not architecture redesign."
    severity: execution

  - gap: "Canada SMB buyers want governance-first roadmaps and vertical tools; RAIS-class agencies sell custom builds without disk SSOT or LOCKED law — we can win on auditability + safe sell path if TrustField/Noetfield vaults are legible."
    implication: "Commercial + Governance specialist outputs are market-relevant artifacts, not internal-only."
    severity: gtm

  - gap: "Pricing transparency crisis industry-wide (ACU, credits, dual pools) creates buyer fear; our hub no-terminal + honest gates could be positioned as cost-predictability if usage accounting is visible."
    implication: "Research finding supports governance-led GTM over autonomy hype."
    severity: commercial

  - gap: "Lovable/Devin optimize generation velocity; none combine REGISTRY/sa-XXXX controlled backlog, validator proofs, and ASF priority plane — our loop is ops-system, not codegen toy."
    implication: "Position against 'vibe automation' with controlled execution receipts."
    severity: positioning

  - gap: "RAIS-class agencies lack self-improvement loop logged; we aspire to it but have not shipped Level 3 zero-human — same gap as market, but we document it."
