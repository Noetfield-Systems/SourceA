question: >
  Landscape brief — RAIS-class automation players, Devin, Lovable, Cursor, and Canada SMB AI market:
  architecture patterns, pricing bands, autonomy claims vs measured reality, and gaps vs Controlled Execution OS.

findings:
  - id: F01
    fact: "RAIS-class players (e.g. rais.systems) are services-led AI automation agencies, not self-serve product platforms; public sites emphasize transformation/consulting with custom quotes rather than published SKU pricing."
    source: "https://rais.systems/"
    confidence: medium
    note: "rais.systems homepage exposes minimal technical architecture; treat RAIS-class as agency + orchestration stack category."

  - id: F02
    fact: "Industry RAIS-class / AI automation agency project fees commonly run $3,000–$100,000+ for scoped builds; ongoing retainers $500–$15,000/month for monitoring, prompt tuning, and ops."
    source: "https://arsum.com/blog/posts/ai-automation-agency-pricing/"
    confidence: high

  - id: F03
    fact: "Mid-market agentic automation builds (multi-system, approvals, LLM steps) are priced $10,000–$35,000 project + $1,500–$4,000/month retainer; compliance-heavy rollouts $35,000–$100,000+."
    source: "https://agixtech.com/insights/how-much-does-it-cost-to-hire-an-ai-automation-agency-in-the-usa/"
    confidence: high

  - id: F04
    fact: "RAIS-class technical stacks typically combine workflow orchestration (Make.com or n8n), RAG/vector stores, MCP or custom tool connectors, and human approval gates — hybrid deterministic workflow + agentic loop is the 2025–2026 production norm."
    source: "https://tao-hpu.medium.com/ai-agent-landscape-2025-2026-a-technical-deep-dive-abda86db7ae2"
    confidence: high

  - id: F05
    fact: "n8n 2.0 (Jan 2026) ships native LangChain integration, 70+ AI nodes, persistent agent memory, vector DB/RAG nodes, and MCP server/client — positioning it as RAIS-class builder substrate for technical SMBs."
    source: "https://www.dygentic.com/blog/make-com-vs-n8n-marketing-agency-automation"
    confidence: high

  - id: F06
    fact: "Devin (Cognition) runs in cloud sandboxes with shell, editor, and browser; bills via usage (ACU ≈ 15 min active work); self-serve plans Free / Pro $20 / Max $200 / Teams $80/mo minimum with unlimited flex seats + $40/mo per full dev seat."
    source: "https://devin.ai/pricing"
    confidence: high

  - id: F07
    fact: "Cognition claimed 13.86% unassisted resolution on full SWE-bench at Devin launch (vs prior SOTA 1.96%); independent Answer.AI eval (Jan 2025) found 3/20 tasks satisfactory, 14 failures, unpredictable success on similar tasks."
    source: "https://www.theregister.com/software/2025/01/23/first-ai-software-engineer-is-bad-at_its-job/549014"
    confidence: high

  - id: F08
    fact: "On SWE-bench Verified (human-audited subset), Devin reportedly drops from 68.3% (full) to 48.2% (verified) — a 29% relative drop suggesting  inflation vs harder real-bug fidelity."
    source: "https://dataku.ai/blog/swe-bench-verified-leaderboard-who-solving-real-bugs"
    confidence: medium
    note: "Secondary aggregator citing leaderboard data; methodology not primary vendor disclosure."

  - id: F09
    fact: "Cursor Cloud Agents run in isolated VMs with repo clone, deps, MCP, browser/desktop control, and parallel execution; Cursor reports ~30–35% of its own merged PRs are agent-generated in cloud sandboxes (Feb 2026)."
    source: "https://cursor.com/blog/agent-computer-use"
    confidence: high

  - id: F10
    fact: "Cursor individual pricing (2026): Pro $20/mo ($20 API pool + generous Auto/Composer pool), Pro+ $60, Ultra $200; Teams Standard $40/user/mo, Premium $120/user/mo (5× usage); Enterprise custom pooled usage."
    source: "https://cursor.com/docs/models-and-pricing"
    confidence: high

  - id: F11
    fact: "Lovable is prompt-to-full-stack (React/TS/Tailwind + Supabase) with credit-based build pricing: Free (5 daily credits, cap 150/mo), Pro $25/mo (100 monthly + daily bonus), Business $50/mo (SSO/security); Cloud+AI runtime billed separately ($25 Cloud + $1 AI workspace allowance, then usage)."
    source: "https://lovable.dev/pricing"
    confidence: high

  - id: F12
    fact: "Lovable autonomy claim ('production-ready apps') is contested: independent reviews cite ~70% build completeness, permissive RLS defaults, debugging/credit loops, and need for manual security/Stripe/webhook hardening before paid-customer launch."
    source: "https://www.insideraitrends.com/blog/is-lovable-production-ready-for-paying-customers-2026/"
    confidence: high

  - id: F13
    fact: "Statistics Canada (2025): 12.2% of Canadian businesses used AI in the prior 12 months, up from 6.1%; another 14.5% plan adoption within a year."
    source: "https://fusioncomputing.ca/ai-strategy-canadian-smbs-2026/"
    confidence: high
    note: "Fusion synthesis citing StatsCan; official table not fetched directly."

  - id: F14
    fact: "Synthesis across CFIB/Info-Tech/Microsoft: ~23–28% of Canadian SMBs had deployed at least one GenAI tool past pilot stage by late 2025; Microsoft 365 Copilot ~45–55% of that deployed base among M365 tenants."
    source: "https://fusioncomputing.ca/state-of-ai-canadian-smbs-2026/"
    confidence: medium
    note: "Multi-source synthesis; headline adoption varies by definition (tool use vs operational integration)."

  - id: F15
    fact: "BDC survey (1,247 owners): 46% plan more AI within 24 months; adoption gap widening — 35% of micro-businesses (≤4 employees) are 'laggers' vs 5% of SMEs ≥100 employees."
    source: "https://www.bdc.ca/globalassets/digizuite/51604-artificial-intelligence-imperative-canada-entrepreneurs.pdf"
    confidence: high

  - id: F16
    fact: "ISED G7 SME AI Adoption Blueprint (2026): Canada ~12.5% of smaller companies report AI use; adoption lags large enterprises across G7; uptake concentrated in ICT and professional services."
    source: "https://ised-isde.canada.ca/site/ised/en/sme-ai-adoption-blueprint"
    confidence: high

  - id: F17
    fact: "Canadian SMB AI barriers shifting from cost/access to governance, cybersecurity, regulatory uncertainty (Bill C-27 / PIPEDA context), and ROI measurement; 63% of orgs had no AI governance policy (IBM 2025, cited in Canada SMB roadmap literature)."
    source: "https://fusioncomputing.ca/ai-strategy-canadian-smbs-2026/"
    confidence: medium

  - id: F18
    fact: "Agentic AI research consensus (2025–2026): practical capability increasingly driven by harness (memory, context, tool routing, verification/governance) not model alone; production systems need deterministic gates, not prompt-only guardrails."
    source: "https://arxiv.org/html/2605.26112"
    confidence: high

comparisons:
  - entity: RAIS_class
    label: "RAIS-type AI automation agencies (rais.systems-class)"
    architecture_pattern: "Human-led discovery → custom workflow/agent build on Make/n8n/LangGraph + RAG + CRM/ops integrations; hybrid workflow-orchestrating-agents; retainer ops."
    pricing_band_usd: "$3K–$100K+ setup; $500–$15K/mo retainer typical"
    autonomy_claim: "End-to-end business transformation with AI agents"
    autonomy_reality: "High human scoping, QA, and change management; agents handle bounded workflows; no public autonomous self-improving OS loop."
    canada_smb_fit: "Strong for firms wanting done-for-you; weak for founders who refuse terminal and need one-tap productized ops."
    vs_controlled_execution_os: " sell outcomes as projects; we sell controlled semi-auto execution spine with disk SSOT and specialist separation."

  - entity: Devin
    label: "Cognition Devin"
    architecture_pattern: "Cloud sandbox VM per session; proprietary SWE models; Slack/GitHub/web triggers; ACU-metered compute."
    pricing_band_usd: "Pro $20/mo; Max $200/mo; Teams $80/mo min + $40/full seat; usage overage at API/ACU rates"
    autonomy_claim: "First AI software engineer — builds, tests, deploys, fixes bugs autonomously"
    autonomy_reality: "Works on well-scoped tasks; independent eval 15% success (3/20); days-long dead-ends on impossible tasks; needs clear specs and human review before merge."
    canada_smb_fit: "Poor default for non-dev SMBs; viable for technical teams with PR review discipline."
    vs_controlled_execution_os: "Devin is repo-scoped coder autonomy without commercial/governance goal separation or disk law hierarchy."

  - entity: Lovable
    label: "Lovable.dev"
    architecture_pattern: "Prompt → React/Supabase full-stack; credit-metered codegen; Lovable Cloud usage billing; GitHub export path."
    pricing_band_usd: "Pro $25/mo (+ Cloud/AI usage); Business $50/mo; Enterprise custom"
    autonomy_claim: "AI software engineer; production-ready apps from natural language"
    autonomy_reality: "~70% to MVP; security/RLS/Stripe/webhook/scale gaps; debugging loops burn credits; regulated/high-traffic needs engineer hardening."
    canada_smb_fit: "Good for Canada SMB MVPs and internal tools if governance + security audit budgeted; risky for healthcare/legal/fintech without Noetfield-style constraints."
    vs_controlled_execution_os: "Lovable optimizes app generation velocity; lacks execution authority separation, validator gates, or founder no-terminal control plane."

  - entity: Cursor
    label: "Cursor IDE + Cloud Agents"
    architecture_pattern: "Local IDE agent + isolated cloud VMs; dual usage pools (Auto/Composer vs API); MCP/skills/hooks; self-hosted cloud option for enterprise."
    pricing_band_usd: "Pro $20; Pro+ $60; Ultra $200; Teams $40–$120/user/mo"
    autonomy_claim: "Self-driving codebases; agents ship tested features end-to-end"
    autonomy_reality: "Strong for dev teams — 30–35% internal PRs agent-made; still requires env setup, review, and taste/judgment; not business-process automation for non-dev SMBs."
    canada_smb_fit: "Best for software shops; marginal for trades/legal/healthcare SMBs without in-house devs."
    vs_controlled_execution_os: "Cursor is developer harness excellence; our OS adds commercial/governance advocacy, disk SSOT, ASF hub, and honest semi-auto gates."

  - entity: Canada_SMB_market
    label: "Canada SMB AI adoption context"
    architecture_pattern: "Copilot-first in M365 tenants; shift to vertical/agentic tools in 2026; governance-before-scale roadmaps (ISED/Mitacs/G7 alignment)."
    pricing_band_usd: "SMB tool spend often $25–$150/user/mo (Copilot/Cursor-class) vs $3K–$35K agency projects for custom automation"
    autonomy_claim: "Vendor marketing promises turnkey AI productivity"
    autonomy_reality: "12–28% operational adoption depending on metric; micro-business lag; governance and skills gaps dominate; procurement advantage emerging for demonstrable AI policy."
    canada_smb_fit: "Canada-first GTM must lead governance + vertical ROI, not generic agent hype."
    vs_controlled_execution_os: "Our Governance Goal Specialist + disk audits align with 2026 Canada SMB buyer anxiety; Commercial Specialist aligns with vertical niche shift."

