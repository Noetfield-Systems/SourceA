    category: cloud_ide_agent
    hq: US (Cognition acquired 2025)
    architecture:
      pattern: vscode_fork_agentic_ide
      stack: "Cascade agent; SWE-1/SWE-1.5 proprietary models; daily+weekly quotas (Mar 2026); cloud sessions; MCP; same Cognition family as Devin."
      deployment: local_ide_plus_cloud_sessions
    pricing_band_usd:
      subscription: "Free quota-limited; Pro $20/mo; Max $200/mo; Teams $40/seat/mo; Enterprise custom ACU-style"
      usage: "Quota windows refresh daily/weekly; overage at API list price; grandfathered $15 Pro for early subscribers"
    autonomy_claim: "Agentic coding flow state; deep codebase understanding; multi-step autonomous edits"
    autonomy_reality: "Strong IDE copilot for devs; quota caps interrupt burst workflows; not autonomous business ops for non-dev SMBs."
    fit:
