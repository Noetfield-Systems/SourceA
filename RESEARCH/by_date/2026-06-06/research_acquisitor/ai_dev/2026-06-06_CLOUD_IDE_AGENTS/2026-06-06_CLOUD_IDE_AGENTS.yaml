    pricing_band_usd:
      subscription: "Free trial; Basic $10/mo; Pro $20/mo; Ultra $60/mo; Team $40 credits/seat"
      usage: "Plan price = included API credits; LLM at cost + 5% markup; credits roll 30 days"
    autonomy_claim: "Agent for multi-file changes, tests, and PR-style work inside JetBrains"
    autonomy_reality: "Strong autocomplete value; agent scope IDE-bound; not cloud autonomous engineer."
