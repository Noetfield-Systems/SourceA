entities:
  - id: replit_agent
    name: Replit Agent
    category: cloud_ide_agent
    hq: US
    architecture:
      pattern: browser_cloud_ide_plus_agent
      stack: "Replit Nix containers; effort-based checkpoint billing; Agent modes (Lite/Economy/Power/Turbo); GitHub sync; autonomous long builds on paid tiers."
      deployment: cloud_only
    pricing_band_usd:
      subscription: "Starter $0; Core ~$17–20/mo (annual vs monthly); Pro ~$95–100/mo"
      usage: "Monthly credit pool ($20 Core / $100 Pro) + pay-as-you-go overage; Agent checkpoints $0.06–$multi per request (effort-based, one checkpoint/request)"
      teams: "Pro up to 15 builders pooled credits"
    autonomy_claim: "AI software engineer; builds full apps from natural language with autonomous long-running builds"
    autonomy_reality: "Strong for prototypes and solo dev MVPs; credit burn unpredictable on large codebases/long context; needs human review for production security and scale."
    fit:
      trustfield: weak — targets developers, not Canada SMB ops/GTM buyers
      sourcea: analog for cloud sandbox + credit metering; not governed execution spine
      noetfield: weak — no governance-first contract layer; permissive defaults risk regulated SMB use

  - id: bolt_new
    name: Bolt.new (StackBlitz)
    category: cloud_ide_agent
    hq: US
    architecture:
      pattern: in_browser_full_stack_codegen
      stack: "WebContainers in browser; token-metered AI; Supabase integration; deploy/hosting; Microsoft Marketplace enterprise path (2026)."
      deployment: cloud_only
    pricing_band_usd:
      subscription: "Free 1M tokens/mo (300K daily cap); Pro $25/mo; Teams $30/user/mo; Enterprise custom"
      usage: "10M tokens/mo on Pro; rollover 1 month on paid; entire codebase re-injected per prompt → token scales with repo size"
      hidden: "Supabase/hosting overages; real spend often $50–75/mo for active builders per independent reviews"
    autonomy_claim: "Build, run, edit, deploy full-stack web apps from a single prompt"
    autonomy_reality: "Fast MVP generation; debugging loops consume tokens; enterprise isolation via own-tenant Azure/AWS is sales-led, not self-serve governance."
    fit:
      trustfield: weak — app builder SKU, not workflow/compliance layer
      sourcea: pattern reference for token economics and browser sandbox agents
      noetfield: weak — no audit/validator gate story for regulated pilots

  - id: vercel_v0
    name: v0 (Vercel)
    category: cloud_ide_agent
    hq: US
    architecture:
      pattern: prompt_to_react_ui_plus_vercel_deploy
      stack: "Token→credit metering; v0 Mini/Pro/Max model tiers; Design Mode; GitHub sync; Vercel deploy path; API access on Premium+."
      deployment: cloud_only
    pricing_band_usd:
      subscription: "Free $5 credits/mo (7 msg/day); Premium $20/mo; Team $30/user/mo; Business $100/user/mo; Enterprise custom"
      usage: "Credits reset monthly, no rollover; model rates e.g. Pro $3/$15 per 1M in/out tokens"
    autonomy_claim: "Generate production UI and full-stack components from prompts"
    autonomy_reality: "Excellent UI velocity for frontend-heavy work; complex multi-file logic burns credits fast; not business-process automation."
    fit:
      trustfield: weak — design/dev acceleration, not TrustField fintech/workflow wedge
      sourcea: deploy + credit transparency patterns only
      noetfield: Business tier training opt-out relevant for enterprise code privacy, not SMB legal sell path

  - id: windsurf
