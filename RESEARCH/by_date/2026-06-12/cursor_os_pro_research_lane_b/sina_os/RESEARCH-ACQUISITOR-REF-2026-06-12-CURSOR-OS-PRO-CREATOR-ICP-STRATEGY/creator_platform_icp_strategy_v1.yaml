# ═══════════════════════════════════════════════════════════════════════════
# PART 4 — BUSINESS STRATEGY & PLANS (brainstorm)
# ═══════════════════════════════════════════════════════════════════════════

strategy_brainstorm:
  positioning:
    one_liner: "The AI studio for creators who get paid per video — not per follower."
    not: "Generic ChatGPT wrapper for teens"
    yes: "Hooks + scripts + music + visuals for volume earners"

  plan_A_tiktok_shop_wedge:
    name: "Shop Stack — 10 hooks in 10 minutes"
    target_icp: [ICP_1]
    offer:
      - "Paste product URL → 10 viral hooks + 3 script outlines + royalty-free music mood"
      - "Upsell: weekly 'winning hook' push for Shop categories"
    acquisition:
      - TikTok Spark ads targeting #tiktokshop #tiktokaffiliate
      - Partner micro-influencers who teach Shop (affiliate for Flibbo sub)
      - Discord: TikTok Shop seller communities
    kpis: [D7 retention of Shop-tagged users, videos exported/week, sub conversion]
    pricing_fit: "Weekly $7.99 justified if 1 extra sale/week"

  plan_B_ugc_pro_wedge:
    name: "Brief Crusher — UGC deliverable factory"
    target_icp: [ICP_2]
    offer:
      - "Brand brief in → 5 hook options + shot list + music bed + caption"
      - "Usage-rights reminder template (educate upsell culture)"
    acquisition:
      - Influee/Billo/Collabstr creator newsletters (sponsorship)
      - LinkedIn ads: 'UGC creator' job titles
      - YouTube: 'how I charge $500 per UGC video'
    kpis: [Time-to-first-export, hook variants generated, Pro tier uptake]

  plan_C_youtube_rpm_wedge:
    name: "RPM Room — finance/tech creator pack"
    target_icp: [ICP_3]
    offer:
      - "Title/thumb concept gen · script outline · B-roll music · research mode"
      - "Niche templates: 'AI tool review' · 'make money' · 'SaaS explainer'"
    acquisition:
      - YouTube pre-roll on  tool reviews (ironic but works)
      - Affiliate with TubeBuddy/vidIQ adjacent (non-compete content tools)
    kpis: [CAC vs LTV in highest RPM niches]

  plan_D_platform_bundles:
    name: "Platform Packs inside app"
    packs:
      - TikTok Shop Pack
      - UGC Brief Pack
      - YouTube Long-Form Pack
      - Instagram Brand Deck Pack
      - Streamer Clip Pack
    why: "ICP self-selects · reduces generic AI positioning"

  plan_E_agency_lite:
    name: "5 clients · 1 subscription"
    target_icp: [ICP_8]
    offer: "Workspace folders per client · batch ideation"
    pricing: "Push toward $19.99/mo or credit bundles"

  plan_F_community_led:
    name: "Winning hooks leaderboard"
    mechanics:
      - "Anonymized top hooks by niche (beauty, finance, Shop)"
      - "Creators submit wins · gamify retention"
    why: "Network effect Flibbo lacks vs CapCut"

  monetization_alignment:
    flibbo_current: "Weekly $6.99–7.99 · Monthly $19.99 · Yearly $99.99 · credits"
    icp_wtp:
      UGC_pro: "Pays $22–99/mo if saves 2+ hours/week"
      Shop_volume: "Pays weekly if tied to commission ROI"
      YouTube_RPM: "Pays yearly upfront if AdSense serious"
    recommendation:
      - "Lead with weekly for Shop/TikTok ICP"
      - "Lead with yearly for YouTube finance ICP"
      - "Credit packs for UGC burst weeks"

  geo_priority:
    tier_1: [US, UK, CA, AU] # TikTok Shop · highest brand deal rates
    tier_2: [MENA, TR, DE] # Flibbo existing strength · growing creator bases
    tier_3: [BR, MX, ID] # Volume · lower ARPU

  _defense:
    vs_capcut: "Strategy layer (hooks, virality scores) not just editing"
    vs_chatgpt: "Creator-native outputs · music · mobile workflow"
    vs_pollo_king: "Ideation + Shop/UGC templates · not model arms race"
    moat_build: "Niche hook libraries with performance tags · UGC/Shop specific"

# ═══════════════════════════════════════════════════════════════════════════
# PART 5 — 90-DAY EXECUTION (practical)
# ═══════════════════════════════════════════════════════════════════════════

ninety_day_execution:
  month_1:
    focus: "ICP_1 + ICP_2 only"
    ship: [TikTok Shop Pack v1, UGC Brief Pack v1, landing pages per pack]
    ads: "$5K/mo TikTok Spark · test 20 hooks in ad creative"
    measure: "CPA to paid sub · W4 retention by ICP tag"
  month_2:
    focus: "Double down winning ICP · add ICP_3 YouTube pack"
    content: "Faceless case study: '30 Shop videos in a week with AI hooks'"
    partnerships: "1 UGC platform newsletter · 2 Shop educator affiliates"
  month_3:
    focus: "Retention + yearly push for YouTube ICP"
    ship: [Hook leaderboard beta, client folders for agency ICP]
    expand: "Instagram beauty if CAC < 30% of year-1 LTV"

  do_not:
    - "Target nano creators with broad 'go viral' ads"
    - "Compete on Sora/Kling model count"
    - "Mix B2B Noetfield branding into Flibbo creator ads"

