# ═══════════════════════════════════════════════════════════════════════════
# COMPARISON — NEWFUND vs YOUR PORTFOLIO LANES
# ═══════════════════════════════════════════════════════════════════════════

comparison_matrix:
  axes: [stage_fit, geo_fit, sector_fit, traction_fit, narrative_fit]

  flibbo_consumer:
    product: "Flibbo — AI viral content app (SOFYO / Prime Digital Lab)"
    stage_fit: "Late for classic Newfund seed IF $1M+ ARR + bootstrapped — they often want first institutional at earlier inflection"
    geo_fit: "Strong — US user base + MENA; founder non-US matches FairMoney/Rwazi pattern"
    sector_fit: "Weak–medium — consumer AI creator apps not in homepage thesis; crowded Cal AI / CapCut adjacency"
    traction_fit: "Strong — Top 100 App Store, $1M+ revenue story"
    narrative_fit: "Medium — needs 'impact' or differentiated AI angle beyond wrapper"
    verdict: >
      Possible but not obvious fit. Newfund backs global B2B/deeptech/cyber/health more visibly than
      subscription consumer creator apps. Bootstrap success may reduce urgency for first-check VC.
    vs_cal_ai_path: "Cal AI took strategic exit to MyFitnessPal — Newfund more likely to back pre-scale B2B AI than post-PMF consumer clone wars"

  ide_for_cursor:
    product: "IDE For Cursor — App Store remote IDE for Cursor users"
    stage_fit: "Medium — pre-seed/seed if MRR early; separate investor program doc exists"
    geo_fit: "Strong US App Store SKU"
    sector_fit: "Medium — dev tools / prosumer SaaS adjacent to portfolio software bets"
    traction_fit: "Depends on TestFlight / subscriber proof"
    narrative_fit: "Weak on 'impact/planet' — pitch productivity + developer wedge"
    verdict: "Separate SKU — pitch as B2B/prosumer dev infra, not Flibbo. Needs live revenue + retention before VC dialog."

  sourcea:
    product: "Controlled execution proof — BLOCK/ALLOW/tamper receipt"
    stage_fit: "Strong IF positioned as enterprise infra pre-revenue with design partners"
    geo_fit: "Medium — US enterprise buyers; founder geo less critical"
    sector_fit: "Strong — AI governance / regtech / trust infra aligns with cyber + AI themes"
    traction_fit: "Needs live receipt demos + pilot logos — internal Mac ecosystem not enough"
    narrative_fit: "Strong — 'trust, audit, institutional proof' matches Newfund cyber/enterprise mood"
    verdict: "Best B2B narrative fit among three IF packaged as enterprise trust layer with pilots — not internal governance OS jargon"

  noetfield:
    product: "Governance execution infrastructure — Copilot / institutional capital"
    stage_fit: "Strong — design partner $2k–10k wedge matches seed narrative"
    geo_fit: "Medium–strong — institutional buyers US/EU"
    sector_fit: "Very strong — AI governance, regtech, capital markets infra; closest to Nucleon/ShareID adjacency"
    traction_fit: "Needs named design partners + board-pack PDF artifact"
    narrative_fit: "Very strong — 'trust infrastructure for capital decisions' > consumer viral"
    verdict: >
      Strongest thematic match to Newfund's visible 2026 bets (agentic AI + enterprise trust + regulated buyers).
      Must lead with Noetfield.com pilot offer, not ecosystem internals.

