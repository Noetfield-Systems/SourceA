        app_store: id6745528204
      - name: Zoombo Nano AI Studio
        threat: medium-high
        edge: "Chat-first · Kling 3 · Veo3 · cost-efficient multi-model"
        app_store: id6739957316
      - name: Loovie
        threat: medium
        edge: "Multi-shot filmmaker · character consistency · replaces 3 subscriptions"
        web: loovie.app
      - name: RTST.ai
        threat: medium
        edge: "1000+ templates · headshots · Seedance/Kling"
        app_store: id6754083413
      - name: Ginly AI
        threat: medium
        edge: "100+ viral photo-to-video effects · TikTok trend cloning"
        app_store: id6749809985
    flibbo_differentiation:
      - "Viral post ideation layer (hooks, virality scores, CTA) — most rivals lead with models not strategy"
      - "Master Brain multi-LLM routing (GPT/Gemini/Claude/Llama) in same app as creation"
      - "AI music generation bundled — Pollo/King stronger on video models, weaker on music+ideas bundle"

  R2_ai_chat_wrappers:
    description: "Substitute — user pays for one AI app instead of ChatGPT + tools"
    market_context_apr_2026:
      chatgpt_mobile_spend: "~$301M/mo global (Appfigures)"
      category_trend: "Revenue diversifying — Claude $76M, Grok $39M, Perplexity ~$11M/mo"
    :
      - { name: ChatGPT, role: category king, spend_per_download: "~$5.83/mo" }
      - { name: Claude, role: fast monetizer, spend_per_download: "~$4.06/mo" }
      - { name: Perplexity, role: research niche, spend_per_download: "~$4.90/mo" }
      - { name: Grok, role: X distribution, spend_per_download: "~$5.26/mo" }
    flibbo_angle: "Not a chat app — creation + virality; avoid head-to-head 'best AI answer' marketing"

  R3_editing_incumbents:
    description: "Incumbents adding AI — huge distribution, slower innovation"
    :
      - { name: CapCut, edge: "ByteDance · TikTok native · free tier" }
