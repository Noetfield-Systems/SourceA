# ═══════════════════════════════════════════════════════════════════════════
# CAL AI — the  story (different category, same playbook)
# ═══════════════════════════════════════════════════════════════════════════

cal_ai_benchmark:
  why_it_matters: >
    Cal AI is the reference for "non-technical founder scales consumer AI app via paid social."
    Different vertical (health) — same growth mechanics Flibbo can copy or defend against.

  product: "AI calorie tracker — photo food → estimate calories"
  founders: "Zach Yadegari + Henry Langmack (teens at launch)"
  metrics:
    downloads: "15M+ (TechCrunch Mar 2026)"
    arr: "$30–50M (sources vary; acquired at high scale)"
    team: "~30 employees (CNBC 2025)"
    marketing_spend_monthly: "~$770K (CNBC 2025)"
    subscription: "$2.49/mo or $29.99/yr (CNBC) — undercuts many AI apps"
  outcome: "Acquired by MyFitnessPal (deal closed Dec 2025, announced Mar 2026)"
  apr_2026_apple_event: "Brief App Store removal — external payments + deceptive paywall; reinstated after fix"
  lesson_for_flibbo:
    win: [viral TikTok loop, speed-over-accuracy UX, relentless paid UA]
    risk: [Apple IAP compliance, paywall clarity, margin compression from ad spend]
    gap: "Cal AI = single job (log food). Flibbo = multi-tool → harder to explain, stickier if retention works"

flibbo_vs_cal_ai:
  same_playbook:
    - bootstrap / no VC narrative
    - US-heavy users despite non-US founder
    - App Store subscription + aggressive Meta/TikTok
    - "built without being a developer" founder story
  different_category:
    flibbo: "Creative / productivity / gen-AI wrapper + creation"
    cal_ai: "Health & fitness / single utility"
  pricing:
    flibbo: "Higher ARPU potential ($7.99/wk vs Cal ~$2.49/mo)"
    cal_ai: "Volume + lower price + acquisition machine"
  strategic_take: >
    Do not compete with Cal AI on product — compete on category leadership in
    "AI creator studio for social." Use Cal AI as a GTM case study, not a feature .

