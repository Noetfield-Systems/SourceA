      - { name: Hypic / BeautyPlus, edge: "Portrait AI · Asia scale" }
      - { name: InShot, edge: "Simple mobile editor + AI add-ons" }
    flibbo_angle: "Win on AI-native workflow + trend ideas, not timeline editing depth"

  R4_vertical_clones:
    description: "Single-job apps eating one Flibbo feature"
    examples:
      - { name: Recipedia, job: "TikTok recipe → structured recipe", note: "Same SOFYO portfolio — sister app not " }
      - { name: Vamos, job: " research + scripts in brand voice" }
      - { name: Spiry, job: "Viral script from trend analysis" }
      - { name: Suno/Udio wrappers, job: "AI music only" }
    flibbo_angle: "Bundle must feel cheaper than 3 apps; cross-sell Recipedia users to Flibbo"

