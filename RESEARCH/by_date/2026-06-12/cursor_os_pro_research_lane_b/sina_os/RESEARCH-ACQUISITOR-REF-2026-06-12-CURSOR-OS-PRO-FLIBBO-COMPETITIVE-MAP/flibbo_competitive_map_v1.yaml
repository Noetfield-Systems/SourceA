# ═══════════════════════════════════════════════════════════════════════════
# SWOT (Flibbo · Jun 2026)
# ═══════════════════════════════════════════════════════════════════════════

swot:
  strengths:
    - proven App Store rank + $1M+ revenue story
    - founder distribution (IG + press)
    - multi-modal bundle (ideas + image + music + chat)
    - credit packs + subs = revenue flexibility
  weaknesses:
    - model-aggregator rivals have more flagship models marketed (Sora, Kling 3, Veo 3.1)
    - "Master Brain" overlaps crowded chat-wrapper category
    - publisher split (SOFYO vs Prime Digital Lab) may confuse store trust
  opportunities:
    - Recipedia cross-promo (same dev — recipe → content pipeline)
    - trend-clone feature (Pollo-style link → replicate) if not shipped
    - MENA scale (LinkedIn claims 1M+ users region)
    - lower weekly entry vs $20/mo chat apps
  threats:
    - Apple IAP/paywall enforcement (Cal AI precedent Apr 2026)
    - CapCut free tier
    - model API cost compression squeezing credit margins
    - single-feature apps undercutting bundle value

