# ═══════════════════════════════════════════════════════════════════════════
# EXECUTIVE SUMMARY
# ═══════════════════════════════════════════════════════════════════════════

executive_summary:
  current_grade: "B+ substance · B- institutional polish"
  one_line: >
    Noetfield already beats most seed sites on honest procurement scope and artifact clarity.
    It loses credibility vs ShareID/Nucleon/Credo on social proof, leadership visibility,
    pricing coherence, and visual trust signals (logos, certifications, press, embedded demo).
  strongest_asset: "Honest Available/Planned/Out of scope badges + TLE/board PDF/ZIP artifact story"
  biggest_gap: "Zero named customers, founders, or third-party validation above the fold"

