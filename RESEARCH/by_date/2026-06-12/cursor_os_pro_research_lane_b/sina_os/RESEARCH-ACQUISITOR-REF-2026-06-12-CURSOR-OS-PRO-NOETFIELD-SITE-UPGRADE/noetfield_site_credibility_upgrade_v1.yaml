# ═══════════════════════════════════════════════════════════════════════════
# INTERNAL INCONSISTENCIES TO FIX (CREDIBILITY KILLERS)
# ═══════════════════════════════════════════════════════════════════════════

consistency_issues:
  pricing_sku_drift:
    problem: "Homepage SKUs vs /gate/ vs /copilot/readiness/ use different names and price anchors"
    examples:
      - "Home: Design partner $2k–10k · Trust Brief $10k"
      - "Gate: Copilot Readiness Standard 15,000 CAD / 4 weeks (default enterprise path)"
      - "Gate: QuickScan, Extended, Trust Ledger ongoing — not on homepage"
    fix: "One canonical SKU matrix page linked from nav — homepage shows 3 tiers max with 'View all programs'"
  brand_naming:
    problem: "Titles vary: 'Noetfield' vs 'Noetfield Enterprise' vs 'Noetfield Systems'"
    fix: "Legal footer everywhere: Noetfield Systems Inc. · jurisdiction · ops email"
  delivery_channel:
    problem: "Playbook Kits via Gumroad feels indie — services via procurement@ — splits buyer mental model"
    fix: "Enterprise path = invoice/PO only on site; Gumroad de-emphasized or under /resources/ for self-serve templates"
  entity_visibility:
    problem: "No About · Team · Company registration on homepage"
    fix: "About page with CEO, advisors, legal entity, HQ (even if 'distributed')"

# ═══════════════════════════════════════════════════════════════════════════
# UPGRADE ROADMAP — REACH BEST-POSSIBLE CREDIBILITY
# ═══════════════════════════════════════════════════════════════════════════

upgrade_roadmap:
  P0_before_design_partner_push:
    goal: "Pass 60-second procurement sniff test"
    items:
      - id: hero_simplify
        action: "One hero sentence + subhead + primary CTA (Book 5-min demo) + secondary (Start sandbox)"
        example_hero: "Signed go/no-go records before Copilot touches production data."
        remove: "Too many above-fold sections competing (Try evaluate + 3 traps + Prove + tiers)"
      - id: embedded_demo
        action: "Hosted video or interactive Loom: evaluate → confidence score → TLE export (Screen Studio film)"
        : "Nucleon product blocks · Credo UI screenshots"
      - id: leadership_block
        action: "About/Team — photo, name, title, 2-line credential (LLB, governance architecture, etc.)"
        : "ShareID founder press · Newfund founder quotes"
      - id: sku_canonical
        action: "Single /pricing or /programs page — table: SKU · price · duration · deliverables · buyer"
        reconcile: [Homepage 3 SKUs, Gate CAD Readiness, Trust Brief, Design partner]
      - id: logo_social_proof
        action: "Logo strip — even 'Design partners in progress' + 2 anonymized quotes by role"
        format: "CISO, regulated financial services · Procurement lead, federal-adjacent"
      - id: trust_footer
        action: "Every page footer: legal entity · privacy · terms · trust center · security contact"

  P1_institutional_grade:
    goal: "Credible to Newfund-style seed + enterprise procurement"
    items:
      - id: trust_center_expand
        action: "Trust center as mini-Vanta: subprocessor list, data flow diagram, retention, DPA request"
        keep: "Honest Planned badges for SOC 2"
      - id: microsoft_alignment
        action: "Microsoft ecosystem page — Copilot Control System complement, Purview metadata, partner status if any"
        badge: "Only if true — 'Built for M365 metadata APIs' not 'Microsoft Partner' unless certified"
      - id: sample_artifacts_gallery
        action: "Public samples hub: TLE YAML · redacted board PDF · ZIP manifest · verify walkthrough GIF"
        existing: "/trust-ledger/sample-report/board-memo.pdf — promote prominently"
      - id: case_study_template
        action: "1 public case study (even pilot): Problem → evaluate → export → board outcome"
        video: "90s W3 outbound style — HeyGen + Screen Studio proof"
      - id: press_page
        action: "/press — boilerplate, logos, contact; add posts as earned"
      - id: insights_hub_light
        action: "3–5 authoritative posts (Copilot governance, metadata-only audit, Canada GC notes)"
        : "Credo Insights Hub lite · Newfund defense/AI posts"

  P2_category_leader:
    goal: "Peer with Credo on Copilot niche"
    items:
      - id: product_ui_marketing
        action: "Dedicated product pages: Evaluate API · Workspace · Export engine · Connectors"
      - id: framework_mapper
        action: "Interactive or PDF: NIST AI RMF · ISO 42001 orientation crosswalk (already cited — make downloadable)"
      - id: customer_wall
        action: "Named logos when contracts allow; until then sector icons (FRFI · MSP · Provincial agency)"
      - id: certification_path
        action: "When ready: SOC 2 Type II badge; until then quarterly 'Trust report' PDF"
      - id: analyst_language
        action: "Category one-liner for Gartner-style buyers: 'Copilot Governance Execution Infrastructure'"

