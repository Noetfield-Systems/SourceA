# PART 4 — STACKS BY VIDEO TYPE (practical)
# ═══════════════════════════════════════════════════════════════════════════

stacks:
  b2b_product_film:
    examples: [SourceA Hub, Noetfield, IDE For Cursor pairing, Linear-style roadmap]
    pipeline: "Script → Screen Studio 4K → ElevenLabs VO → Descript → Artlist"
    ai_gen: "fal Kling 5–10s opener/closer optional"
    runtime_rule: ">=70% real UI"
    cost_usd: "150–600 per 90s"

  w1_proof_film_5min:
    pipeline: "Screen Studio terminal + Hub → Descript chapters → minimal music"
    avoid: [HeyGen-only, pure T2V fake dashboard]
    cost_usd: "200–400"
    weeks: "1–2"

  w3_outbound_30_90s:
    pipeline: "HeyGen template + Screen Studio proof B-roll insert → Descript"
    cost_usd: "200–500 for batch"
    scale: "10+ personalized openers from one template"

  hero_brand_60_90s:
    pipeline: "Eleven Flows (Veo + Kling nodes) → Studio → 4K"
    alt: "Runway Gen-4.5 if max camera control"
    cost_usd: "400–1200"

  performance_ads:
    pipeline: "Creatify + fal + Descript cutdowns"
    variants: "5–30"
    cost_usd: "100–1500 by volume"

  enterprise_presenter_training:
    pipeline: "Synthesia or HeyGen · locked script · not raw T2V for legal lines"

# ═══════════════════════════════════════════════════════════════════════════
# PART 5 — FLOWS VS RUNWAY (head-to-head)
# ═══════════════════════════════════════════════════════════════════════════

flows_vs_runway:
  eleven_flows:
    best_for: [reusable ad factory, VO+music in one place, multilingual, monthly campaigns]
    weak: [not screen recorder, less per-shot cinema control]
    cost_90s_hybrid: "$80–150"
  runway_gen_45:
    best_for: [single cinematic hero, Motion Brush, character consistency]
    weak: [need external audio stack, weak UI accuracy]
    cost_90s_hybrid: "$70–140 + tool hopping"
  both_need: Screen Studio for any product/governance proof on screen
  decision:
    ad_pipeline_reuse: Eleven Flows
    one_shot_cinema: Runway
    b2b_truth: Screen Studio

# ═══════════════════════════════════════════════════════════════════════════
# PART 6 — 90s TIER-1 PLAYBOOK (copy-paste production)
# ═══════════════════════════════════════════════════════════════════════════

ninety_second_playbook:
  structure:
    - "0:00–0:05 — hook (problem/fear one line)"
    - "0:05–0:15 — optional 5s Kling B-roll OR UI wide shot"
    - "0:15–0:55 — three product beats ~12s each"
    - "0:55–1:20 — outcome + proof strip"
    - "1:20–1:30 — single CTA"
  stack: [Screen Studio, ElevenLabs Creator, Descript Creator, Artlist, fal.ai optional]
  budget:
    first_video_usd: "145–175"
    repeat_usd: "15–40"
    time_hours: "6–8 solo"
  export:
    resolution: "3840x2160 or 1920x1080"
    fps: 30
    codec: "H.264 high bitrate"
    captions: burned-in

linear_reference:
  file: "/Users/sinakazemnezhad/Downloads/LinearH264Version_1.mp4"
  duration_sec: 239
  resolution: "3840x2160 4K"
  lesson: "Roadmap UI film = Screen Studio + VO + edit — NOT text-to-video"

# ═══════════════════════════════════════════════════════════════════════════
# PART 7 — COST INTELLIGENCE
# ═══════════════════════════════════════════════════════════════════════════

cost_intelligence:
  unit_economics_usd:
    b2b_90s_agency: "8000–25000"
    b2b_90s_smart: "150–600"
    hero_plus_5_broll_agency: "15000–40000"
    hero_plus_5_broll_smart: "400–1200"
    avatar_20_clips_agency: "5000–15000"
    avatar_20_clips_smart: "200–800"
  formula: "Total = script + capture + gen credits + edit + music + revisions"
  budget_buckets_pct: { proof: 40, acquire: 35, brand: 15, lab: 10 }
  kpis:
    - cost per shipped minute
    - cost per meeting booked from video
    - pct runtime real product ">=60%"
    - variants tested vs winner scaled ">=5:1"
    - active subscriptions "<=5"
  decision_gates:
    - "Can Screen Studio show it? → yes → skip Runway for main body"
    - "Need face at scale? → HeyGen not cinematic gen"
    - "Need 20+ cuts? → Creatify/fal not manual Runway"
  quarter_plan_usd: "1000–2500 all video vs agency 30000–80000"

# ═══════════════════════════════════════════════════════════════════════════
# PART 8 — OUR RECOMMENDED STACK (lock this)
# ═══════════════════════════════════════════════════════════════════════════

recommended_stack:
  name: "Proof + Outbound Video Stack"
  monthly_usd: "200–350"
  core:
    - { tool: Screen Studio, role: all product/proof capture, cost: "~$89 once or $29/mo" }
    - { tool: ElevenLabs Creator, role: voice + optional music, cost: "~$22–99/mo" }
    - { tool: Descript Creator, role: edit + captions + cutdowns, cost: "~$24/mo" }
    - { tool: Artlist or Epidemic, role: licensed music, cost: "~$10–15/mo" }
    - { tool: fal.ai, role: "Kling B-roll only ≤15s per film", cost: "~$1–10/use" }
  add_when_w3_starts:
    - { tool: HeyGen, role: outbound presenter templates, cost: "~$29/mo" }
  defer_until_2plus_campaigns_per_month:
    - Eleven Flows
    - Runway subscription
    - Creatify

  decision_tree:
    - { if: "Showing real product or terminal", then: Screen Studio + Descript }
    - { if: "Personalized outbound at scale", then: add HeyGen }
    - { if: "Need 5s cinematic opener only", then: fal Kling once }
    - { if: "Need 20+ ad variants", then: add Creatify that month }

  golden_insight: "Top-tier B2B video = real capture + pro voice + derivatives. AI gen is spice, not the meal."

