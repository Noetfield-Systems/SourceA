# ═══════════════════════════════════════════════════════════════════════════
# PART 1 — WHY VIDEO (our business jobs · not governance docs)
# ═══════════════════════════════════════════════════════════════════════════

business_video_jobs:
  one_line: >
    We need tier-1 commercial video affordably — product proof on screen, outbound presenter clips,
    and short ad variants — without agency budgets or fake AI-generated UI.

  jobs:
    W1_proof_film:
      what: "5-min demo on camera — show product working (terminal, Hub, governance loop)"
      style: "Real UI capture · not talking-head-only · not fake dashboard T2V"
      priority: P0
    W3_outbound:
      what: "Personalized 30–90s openers for Noetfield / enterprise Copilot governance pilot"
      style: "HeyGen or template presenter + real product insert"
      parallel: "Can start Week 1 — does not require W1 master film finished"
    product_demo_90s:
      what: "Short B2B clips — SourceA, Noetfield, IDE For Cursor pairing"
      style: "Linear-class 4K UI film (see linear_reference)"
    performance_ads:
      what: "5–30 variant tests for LinkedIn/Meta"
      style: "Fast iteration · kill losers in 48h"

  what_top_tier_means_for_us:
    - real product visible >=70% of runtime
    - pro voice + licensed music
    - 4K or crisp 1080p · burned-in captions
    - one clear CTA per video
    - cost << agency ($150–600 vs $8k–25k for 90s)

# ═══════════════════════════════════════════════════════════════════════════
# PART 2 — MARKET MODEL (how to pick tools · June 2026)
# ═══════════════════════════════════════════════════════════════════════════

market:
  size_usd_2026: "847M–946M AI video generator category"
  CAGR: "~19–20% toward ~$3.3B by 2034"

  four_layers:
    L1_models: "Text/image → clip (5–60s) — Veo, Kling, Runway, Seedance, Pika, Luma"
    L2_studios: "Capture + edit — Screen Studio, Descript, DaVinci, Premiere"
    L3_avatars: "Presenter at scale — HeyGen, Synthesia, D-ID, Tavus"
    L4_production_os: "Script → finished ad — Eleven Flows, Creatify, Pexo, Invideo AI"
    L5_voice_music: "ElevenLabs, Artlist, Epidemic Sound"
    L6_api: "fal.ai, Replicate, Vertex, Runway API"

  golden_rule: "Tier-1 B2B = L2 real capture + L5 voice. Generative AI ≤20% of runtime."

  market_signals:
    runway: "$315M Series E @ $5.3B · Gen-4.5 filmmaker standard"
    synthesia: "~$150M ARR @ $4B · enterprise L&D"
    kling: "Top blind comparison scores · best value B-roll"
    elevenlabs: "Creative Platform — Flows + Studio + multi-model video"
    sora: "Avoid long-term dependency — consumer sunset 2026"
    fal: "$0.05–0.40/sec · 600+ models · cheapest API path"

