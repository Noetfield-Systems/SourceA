# ─── Four layers (how to pick tools) ─────────────────────────────────────────
four_layers:
  L1_models: "Prompt → clip (5–60s) — Veo, Kling, Runway, Seedance, Pika, Luma…"
  L2_studios: "Motion control + edit — Runway workspace, Screen Studio, Descript, DaVinci"
  L3_avatars: "Presenter scale — HeyGen, Synthesia, D-ID, Tavus"
  L4_production_os: "Script → finished ad — Eleven Flows, Pexo, Creatify, Invideo AI"
  rule: "Tier-1 commercial = L4 or L2+real capture; never L1 alone for B2B product proof"

