# ─── One 90s tier-1 video — stack + budget ─────────────────────────────────
ninety_second_tier1:
  structure:
    - "0:00–0:05 hook"
    - "0:05–0:15 optional 5s B-roll or UI wide"
    - "0:15–0:55 three product beats ~12s each"
    - "0:55–1:20 outcome + proof strip"
    - "1:20–1:30 single CTA"
  stack:
    script: Claude / founder brief
    capture: Screen Studio
    voice: ElevenLabs Creator
    edit: Descript Creator
    music: Artlist or Epidemic Sound
    optional_broll: "fal.ai Kling ~10s"
    grade: DaVinci Resolve free optional
  budget_first_video_usd:
    screen_studio: 89
    elevenlabs_month: 22
    descript_month: 24
    music_amortized: 10
    fal_broll: "1–5"
    total_cash: "145–175"
  budget_repeat_video_usd: "15–40"
  time_hours: "6–8 solo"
  export:
    resolution: "3840x2160 or 1920x1080"
    fps: 30
    codec: H.264 high bitrate
    captions: burned-in

# ─── Eleven Flows vs Runway head-to-head ───────────────────────────────────
head_to_head:
  tools: [ElevenCreative Flows, Runway Gen-4.5]
  verdict:
    ad_pipeline_reuse: Eleven Flows
    cinematic_single_shot: Runway
    b2b_ui_proof: "Neither alone — Screen Studio required"
  comparison:
    flows:
      type: node canvas orchestration
      strength: [VO, music, lip-sync, multi-model nodes, reusable Flows]
      weakness: [not screen recorder, less per-pixel control]
      cost_90s_hybrid_usd: "80–150"
    runway:
      type: creative studio + Gen-4.5
      strength: [Motion Brush, camera, character consistency, API]
      weakness: [external audio stack, weak UI accuracy]
      cost_90s_hybrid_usd: "70–140 plus tool hopping"
  decision_matrix:
