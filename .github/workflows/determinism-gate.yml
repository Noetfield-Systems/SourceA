name: determinism-gate

# Push CI only for determinism paths. Scheduled 24/7: CF loop-specialist 30 */6 * * *
# EXECUTION LAW: data/cf-only-24-7-execution-v1.json — never add schedule: to this file.
on:
  workflow_dispatch:
  push:
    branches: [main]
concurrency:
  group: determinism-gate
  cancel-in-progress: false
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: L14 trigger registry sweep
        run: bash scripts/validate-trigger-registry-v1.sh
      - name: L16 GitHub automation governance
        run: bash scripts/validate-github-automation-governance-v1.sh
