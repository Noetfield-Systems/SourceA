name: determinism-gate
on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'
  push:
    branches: [main]
concurrency:
  group: determinism-gate
  cancel-in-progress: false
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Machine process validation (L14 + L16 + SSOT)
        run: bash scripts/validate-machine-process-v1.sh
