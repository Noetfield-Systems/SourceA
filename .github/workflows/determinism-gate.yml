name: determinism-gate

# Push CI only for determinism paths. Scheduled 24/7: CF loop-specialist 30 */6 * * *
# EXECUTION LAW: data/cf-only-24-7-execution-v1.json — never add schedule: to this file.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/verify_autorun_determinism_v1.py'
      - 'scripts/autorun_legal_transitions_v1.py'
      - 'scripts/validate_locked_definitions_anatomy_v1.py'
      - 'reports/locked-definitions-v1.json'
      - 'data/trigger-registry-v1.json'
      - 'data/mission-registry-v1.json'
      - '.github/workflows/determinism-gate.yml'

permissions:
  contents: read

concurrency:
  group: determinism-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  determinism-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Locked definitions anatomy lint (NOETFIELD P2)
        run: |
          set -euo pipefail
          python3 scripts/validate_locked_definitions_anatomy_v1.py --json

      - name: Trigger registry sweep (NOETFIELD P1)
        run: |
          set -euo pipefail
          python3 scripts/sandbox_health_sweep_v1.py --json

      - name: Determinism gate (D1-D5)
        run: |
          set -euo pipefail
          python3 scripts/verify_autorun_determinism_v1.py \
            --json --write-receipt > "${{ runner.temp }}/determinism-verify.json"
          python3 -c "import json; d=json.load(open('${{ runner.temp }}/determinism-verify.json')); print(d.get('report_line','')); exit(0 if d.get('ok') else 1)"

      - name: Upload determinism receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: determinism-gate-receipt
          path: receipts/cloud/autorun-determinism/
          retention-days: 30
