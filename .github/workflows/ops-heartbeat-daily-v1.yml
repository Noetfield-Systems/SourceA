name: ops-heartbeat-daily

# Schedule retired — CF loop-specialist cron 0 7 * * * → Railway /api/fbe/ops/heartbeat/v1
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ops-heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 07:00 UTC ops heartbeat
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: python3 scripts/daily_ops_heartbeat_v1.py --json
