name: autonomous-drain-cron-v1

on:
  workflow_dispatch:

concurrency:
  group: autonomous-drain-cron-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cloud-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: POST Railway auto-tick manual backup
        env:
          FBE_CLOUD_WORKER_URL: ${{ secrets.FBE_CLOUD_WORKER_URL }}
          FBE_INTERNAL_SECRET: ${{ secrets.FBE_INTERNAL_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${FBE_CLOUD_WORKER_URL:-}" ]]; then
            echo "GitHub Actions scheduler disabled: Cloudflare cron is primary for Auto Runtime."
            echo "Set FBE_CLOUD_WORKER_URL only when using this workflow_dispatch backup."
            exit 0
          fi
          auth_args=()
          if [[ -n "${FBE_INTERNAL_SECRET:-}" ]]; then
            auth_args=(-H "Authorization: Bearer ${FBE_INTERNAL_SECRET}")
          fi
          curl -sf --max-time 600 -X POST \
            "${FBE_CLOUD_WORKER_URL%/}/api/cloud-forge-run/auto-tick/v1" \
            -H "Content-Type: application/json" \
            "${auth_args[@]}" \
            -d '{"trigger_source":"github_actions_manual_backup","auto_tick":true,"full_pack":true,"max_advance":100,"llm_provider":"openrouter"}'
