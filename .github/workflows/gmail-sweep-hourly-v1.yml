name: gmail-sweep-hourly

# Manual backup only — 24/7: CF loop-specialist → Railway. Law: data/cf-only-24-7-execution-v1.json
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gmail-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Gmail sweep + triage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_DELEGATED_USER: ${{ secrets.GMAIL_DELEGATED_USER }}
          TELEGRAM_PRIMARY_BOT_TOKEN: ${{ secrets.TELEGRAM_PRIMARY_BOT_TOKEN }}
          TELEGRAM_OPS_CHAT_ID: ${{ secrets.TELEGRAM_OPS_CHAT_ID }}
        run: |
          python3 scripts/gmail_inbox_sweep_v1.py --json
          python3 scripts/signal_factory_triage_v1.py --json
