name: external-verify

# L4 law: only this Action's receipt counts as PASS evidence for autorun verify.
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/verify_autorun_zero_manual_v1.py'
      - 'scripts/cloud_auto_runtime_v1.py'
      - 'data/cloud-auto-runtime-v1.json'
      - '.github/workflows/external-verify.yml'

jobs:
  external-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run autorun external verify (L4)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OUT: receipts/cloud/external-verify/external-verify-${{ github.run_id }}-v1.json
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$OUT")"
          python3 scripts/verify_autorun_zero_manual_v1.py --hours 24 --json > /tmp/verify-raw.json
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          raw = json.load(open("/tmp/verify-raw.json"))
          row = {
              "schema": "external-verify-receipt-v1",
              "version": "1.0.0",
              "at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "law": "GOVERNED_AUTORUN_LAWS_v2 L4 — external verify only",
              "github_run_id": os.environ["GITHUB_RUN_ID"],
              "github_sha": os.environ["GITHUB_SHA"],
              "workflow": "external-verify.yml",
              "verify": raw,
              "ok": bool(raw.get("ok")),
          }
          out = os.environ["OUT"]
          os.makedirs(os.path.dirname(out), exist_ok=True)
          with open(out, "w") as f:
              json.dump(row, f, indent=2)
              f.write("\n")
          print(json.dumps({"ok": row["ok"], "path": out, "report_line": raw.get("report_line")}))
          if not row["ok"]:
              raise SystemExit(1)
          PY

      - name: Upload external-verify receipt artifact
        uses: actions/upload-artifact@v4
        with:
          name: external-verify-receipt
          path: receipts/cloud/external-verify/
          retention-days: 30
