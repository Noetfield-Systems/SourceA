name: external-verify

# L4 law: only this Action's receipt counts as PASS evidence for autorun verify.
# Trigger: push to paths below · workflow_dispatch · cron */6h
permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/verify_autorun_zero_manual_v1.py'
      - 'scripts/verify_client_proof_founder_review_v1.py'
      - 'scripts/build_external_verify_receipt_v1.py'
      - 'scripts/ensure_truth_log_schema_v1.py'
      - 'scripts/post_external_verify_truth_v1.py'
      - 'scripts/cloud_auto_runtime_v1.py'
      - 'data/cloud-auto-runtime-v1.json'
      - '.github/workflows/external-verify.yml'
      - 'scripts/verify_autorun_determinism_v1.py'
      - 'scripts/autorun_legal_transitions_v1.py'
      - 'docs/GOVERNED_AUTORUN_LAWS_v3.md'
      - 'infra/supabase/portfolio-spine/migrations/005_truth_log_external_verify_v1.sql'

jobs:
  external-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Autorun verify (24h window)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          python3 scripts/verify_autorun_zero_manual_v1.py --hours 24 --json > /tmp/autorun-verify.json
          python3 -c "import json; d=json.load(open('/tmp/autorun-verify.json')); print(d.get('report_line','')); exit(0 if d.get('ok') else 0)"

      - name: 15-recipe founder proof (public HTTPS only)
        run: |
          set -euo pipefail
          python3 scripts/verify_client_proof_founder_review_v1.py \
            --json --min-seconds-after-deploy 0 > /tmp/founder-proof-15.json || true
          python3 -c "import json; d=json.load(open('/tmp/founder-proof-15.json')); print(f\"15-recipe {d.get('passed')}/{d.get('total')} ok={d.get('ok')}\")"

      - name: Determinism gate (D1-D5 L13)
        run: |
          set -euo pipefail
          python3 scripts/verify_autorun_determinism_v1.py --json --write-receipt > /tmp/determinism-verify.json
          python3 -c "import json; d=json.load(open('/tmp/determinism-verify.json')); print(d.get('report_line','')); exit(0 if d.get('ok') else 1)"

      - name: Build external-verify receipt
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_RUN_CONCLUSION: pending
        run: |
          set -euo pipefail
          mkdir -p receipts/cloud/external-verify
          OUT="receipts/cloud/external-verify/external-verify-${{ github.run_id }}-v1.json"
          python3 scripts/build_external_verify_receipt_v1.py \
            --autorun /tmp/autorun-verify.json \
            --founder-proof /tmp/founder-proof-15.json \
            --determinism /tmp/determinism-verify.json \
            --out "$OUT" --json | tee /tmp/receipt-build.json

      - name: Ensure truth_log schema (002+005)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          python3 scripts/ensure_truth_log_schema_v1.py --json

      - name: POST receipt to Supabase truth_log (L4 sink)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          OUT="receipts/cloud/external-verify/external-verify-${{ github.run_id }}-v1.json"
          python3 scripts/post_external_verify_truth_v1.py --receipt "$OUT" --json | tee /tmp/truth-post.json
          python3 -c "import json; r=json.load(open('/tmp/truth-post.json')); assert r.get('ok'), r; print('truth_log_id', r.get('truth_log_id'))"

      - name: Fail closed if verify not PASS
        run: |
          set -euo pipefail
          python3 -c "
          import json, sys
          r=json.load(open('receipts/cloud/external-verify/external-verify-${{ github.run_id }}-v1.json'))
          if not r.get('ok'):
              print('FAIL:', r.get('report_line'))
              sys.exit(1)
          print('PASS:', r.get('report_line'))
          "

      - name: Upload external-verify receipt artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-verify-receipt
          path: receipts/cloud/external-verify/
          retention-days: 30

      - name: Commit external-verify receipt (disk mirror)
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add receipts/cloud/external-verify/
          if git diff --staged --quiet; then
            echo "no receipt diff to commit"
            exit 0
          fi
          git commit -m "chore(receipts): external-verify run ${{ github.run_id }} [skip ci]"
          git push
