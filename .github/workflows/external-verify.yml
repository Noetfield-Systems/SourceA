name: external-verify

# L4 buyer-surface lane — founder_proof_15 (body_sha256) + truth_log REST POST.
# PN-001: workflow_run chain from deploy (no timing guess).
# PN-002: concurrency group + 15-recipe matrix fan-out (D2 at CI).
# Determinism: determinism-gate.yml (separate workflow).
on:
  workflow_dispatch:
  workflow_run:
    workflows: [deploy-sourcea-buyer-surfaces-v1]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - '.github/workflows/external-verify.yml'
      - '.github/workflows/deploy-sourcea-buyer-surfaces-v1.yml'
      - 'scripts/verify_client_proof_founder_review_v1.py'
      - 'scripts/build_external_verify_l4_receipt_v1.py'
      - 'scripts/post_external_verify_l4_truth_v1.py'
      - 'scripts/ensure_truth_log_schema_v1.py'
      - 'scripts/apply_truth_log_migration_v1.sh'
      - 'scripts/apply_portfolio_spine_migrations_v1.sh'
      - 'scripts/cloud_forge_run_supabase_v1.py'
      - 'scripts/mac_spine_bridge_v1.py'
      - 'scripts/agent_session_cost_v1.py'
      - 'scripts/query_spine_proof_v1.py'
      - 'data/client-proof-founder-review-pack-v1.json'

permissions:
  contents: read

concurrency:
  group: external-verify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-recipe:
    if: >
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    name: Recipe ${{ matrix.recipe_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix:
        recipe_id:
          - cpr-agency-onepager
          - cpr-agentgo-case
          - cpr-brain-chat
          - cpr-contract-aivg
          - cpr-contract-eacp
          - cpr-contract-operating-brain
          - cpr-eval-boot
          - cpr-forge-terminal
          - cpr-free-job-intake
          - cpr-live-receipt
          - cpr-procurement-pack
          - cpr-proof-export-loop
          - cpr-pureflow-case
          - cpr-railway-observer
          - cpr-supabase-rows
    env:
      VERIFY_TRIGGER_SOURCE: ${{ github.event_name == 'workflow_run' && 'deploy_workflow_run_chain' || github.event_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify single recipe (matrix fan-out)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          python3 scripts/verify_client_proof_founder_review_v1.py \
            --json \
            --min-seconds-after-deploy 0 \
            --recipe-id "${{ matrix.recipe_id }}" \
            > "${{ runner.temp }}/recipe-${{ matrix.recipe_id }}.json"

      - name: Upload recipe result
        uses: actions/upload-artifact@v4
        with:
          name: recipe-${{ matrix.recipe_id }}
          path: ${{ runner.temp }}/recipe-${{ matrix.recipe_id }}.json
          retention-days: 7

  buyer-surfaces-l4:
    needs: verify-recipe
    if: >
      always() &&
      needs.verify-recipe.result != 'cancelled' &&
      (github.event_name != 'workflow_run' ||
       (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      VERIFY_TRIGGER_SOURCE: ${{ github.event_name == 'workflow_run' && 'deploy_workflow_run_chain' || github.event_name }}
      DEPLOY_RUN_ID: ${{ github.event.workflow_run.id || '' }}
      DEPLOY_RUN_URL: ${{ github.event.workflow_run.html_url || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download matrix recipe artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: recipe-*
          path: recipe-results
          merge-multiple: true

      - name: Aggregate 15-recipe founder proof
        env:
          FOUNDER_PROOF_OUT: ${{ runner.temp }}/founder-proof-15.json
          VERIFY_TRIGGER_SOURCE: ${{ env.VERIFY_TRIGGER_SOURCE }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, subprocess, sys
          from datetime import datetime, timezone
          from pathlib import Path
          root = Path("recipe-results")
          files = sorted(root.glob("recipe-*.json"))
          if len(files) != 15:
              print(f"expected 15 recipe artifacts, got {len(files)}", file=sys.stderr)
              sys.exit(1)
          rows = []
          deploy_gate = None
          for path in files:
              doc = json.loads(path.read_text(encoding="utf-8"))
              deploy_gate = deploy_gate or doc.get("deploy_gate")
              rows.extend(doc.get("rows") or [])
          passed = sum(1 for r in rows if r.get("verdict") == "PASS")
          out = {
              "schema": "client-proof-founder-review-verify-v1",
              "version": "1.1.0",
              "at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "trigger_source": os.environ.get("VERIFY_TRIGGER_SOURCE") or "manual",
              "commit_sha": subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip(),
              "deploy_gate": deploy_gate,
              "total": len(rows),
              "passed": passed,
              "ok": passed == len(rows) == 15,
              "pack_path": "data/client-proof-founder-review-pack-v1.json",
              "matrix_fanout": True,
              "rows": rows,
          }
          out_path = Path(os.environ["FOUNDER_PROOF_OUT"])
          out_path.write_text(json.dumps(out, indent=2) + "\n", encoding="utf-8")
          print(json.dumps({"passed": passed, "total": len(rows), "ok": out["ok"]}, indent=2))
          sys.exit(0 if out["ok"] else 1)
          PY

      - name: Ensure portfolio-spine schema (migrations 002+005+006+007)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          python3 -m pip install -q psycopg2-binary
          bash scripts/apply_portfolio_spine_migrations_v1.sh || true
          python3 scripts/ensure_truth_log_schema_v1.py --json

      - name: Seed spine heartbeat + AGENT_SESSION_COST (L16/L17 proof)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          python3 scripts/mac_spine_bridge_v1.py heartbeat --agent-id github-ci --role cloud --json
          python3 scripts/agent_session_cost_v1.py post --agent-id github-ci --role cloud-ci --tier T0 --json

      - name: Query spine proof (L4 + heartbeat + session cost)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPINE_PROOF_OUT: ${{ runner.temp }}/spine-proof.json
        run: |
          set -euo pipefail
          python3 scripts/query_spine_proof_v1.py --agent-id github-ci --json | tee "$SPINE_PROOF_OUT"
          python3 - <<'PY'
          import json, os, sys
          from pathlib import Path
          doc = json.loads(Path(os.environ["SPINE_PROOF_OUT"]).read_text(encoding="utf-8"))
          l4 = doc.get("l4") or {}
          spine = doc.get("spine") or {}
          hb = spine.get("heartbeat") or {}
          cost = spine.get("session_cost") or {}
          if not l4.get("l4_closed"):
              print("FAIL: no EXTERNAL_VERIFY_PASS row yet (prior runs)", file=sys.stderr)
          if not hb.get("fetch_ok"):
              print("FAIL: mac_agent_heartbeat table unreachable", file=sys.stderr)
              sys.exit(1)
          if hb.get("dashboard_status") == "STALE_DATA":
              print("FAIL: heartbeat dashboard STALE_DATA", file=sys.stderr)
              sys.exit(1)
          if not cost.get("fetch_ok"):
              print("FAIL: AGENT_SESSION_COST query failed", file=sys.stderr)
              sys.exit(1)
          if not cost.get("truth_log_id"):
              print("FAIL: no AGENT_SESSION_COST row in truth_log", file=sys.stderr)
              sys.exit(1)
          payload = (cost.get("row") or {}).get("payload") or {}
          if "usd_marginal" not in payload or "usd_list_equiv" not in payload:
              print("FAIL: cost receipt missing usd_marginal/usd_list_equiv", file=sys.stderr)
              sys.exit(1)
          print(json.dumps({
              "l4_truth_log_id": l4.get("truth_log_id"),
              "heartbeat_id": (hb.get("row") or {}).get("id"),
              "session_cost_id": cost.get("truth_log_id"),
              "dashboard_status": hb.get("dashboard_status"),
          }, indent=2))
          PY

      - name: Build L4 receipt (body hashes)
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VERIFY_TRIGGER_SOURCE: ${{ env.VERIFY_TRIGGER_SOURCE }}
          DEPLOY_RUN_ID: ${{ env.DEPLOY_RUN_ID }}
          DEPLOY_RUN_URL: ${{ env.DEPLOY_RUN_URL }}
        run: |
          set -euo pipefail
          python3 scripts/build_external_verify_l4_receipt_v1.py \
            --founder-proof "${{ runner.temp }}/founder-proof-15.json" \
            --out "${{ runner.temp }}/external-verify-l4-receipt.json" --json

      - name: POST L4 receipt to truth_log (REST)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RECEIPT_PATH: ${{ runner.temp }}/external-verify-l4-receipt.json
        run: |
          set -euo pipefail
          python3 scripts/post_external_verify_l4_truth_v1.py --receipt "$RECEIPT_PATH" --json

      - name: Upload L4 receipt artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-verify-l4-receipt
          path: ${{ runner.temp }}/external-verify-l4-receipt.json
          retention-days: 30

      - name: Upload spine proof artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spine-proof
          path: ${{ runner.temp }}/spine-proof.json
          retention-days: 30
          if-no-files-found: ignore
