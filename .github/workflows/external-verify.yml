name: external-verify

# L4 minimal lane — buyer public surfaces only (curl + forbidden scan).
# truth_log POST and determinism are added in separate commits/workflows.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/external-verify.yml'
      - 'scripts/external_verify_l4_minimal_v1.sh'
      - 'data/client-proof-founder-review-pack-v1.json'

permissions:
  contents: read

jobs:
  buyer-surfaces-l4:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Curl 15 buyer surfaces + forbidden scan
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXTERNAL_VERIFY_L4_RECEIPT: ${{ runner.temp }}/external-verify-l4-receipt.json
        run: bash scripts/external_verify_l4_minimal_v1.sh

      - name: Upload L4 receipt artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-verify-l4-receipt
          path: ${{ runner.temp }}/external-verify-l4-receipt.json
          retention-days: 30
