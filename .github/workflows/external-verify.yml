name: external-verify

# L4 minimal lane — buyer public surfaces only (curl + forbidden scan).
# truth_log POST and determinism are added in separate commits/workflows.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/external-verify.yml'
      - 'scripts/external_verify_l4_minimal_v1.sh'
      - 'data/client-proof-founder-review-pack-v1.json'

permissions:
  contents: read

jobs:
  buyer-surfaces-l4:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Curl 15 buyer surfaces + forbidden scan
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXTERNAL_VERIFY_L4_RECEIPT: ${{ runner.temp }}/external-verify-l4-receipt.json
        run: bash scripts/external_verify_l4_minimal_v1.sh

      - name: Upload L4 receipt artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-verify-l4-receipt
          path: ${{ runner.temp }}/external-verify-l4-receipt.json
          retention-days: 30

      - name: POST L4 receipt to truth_log (curl REST)
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RECEIPT_PATH: ${{ runner.temp }}/external-verify-l4-receipt.json
        run: |
          set -euo pipefail
          test -f "$RECEIPT_PATH"
          EVENT="$(
            python3 -c "import json; r=json.load(open('$RECEIPT_PATH')); print('EXTERNAL_VERIFY_PASS' if r.get('ok') else 'EXTERNAL_VERIFY_FAIL')"
          )"
          BODY="$(
            python3 -c "
          import json, os
          r=json.load(open(os.environ['RECEIPT_PATH']))
          print(json.dumps({
            'source': 'github_actions',
            'event': os.environ['EVENT'],
            'receipt_id': f\"external-verify-l4-{r.get('github_run_id','')}\",
            'deployment_id': (r.get('github_sha') or '')[:64] or None,
            'payload': r,
          }))
          " EVENT="$EVENT"
          )"
          curl -sfS -X POST "${SUPABASE_URL%/}/rest/v1/truth_log" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            --data-binary "$BODY" | python3 -c "import json,sys; rows=json.load(sys.stdin); print('truth_log_id', (rows[0] if isinstance(rows,list) else rows).get('id'))"
