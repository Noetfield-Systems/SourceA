name: deploy-sourcea-buyer-surfaces-v1

# PN-001: deploy completes → external-verify chains via workflow_run (no timing guess).
# PN-003 prep: environment production — founder enables required reviewers in GitHub UI (P4).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'SourceA-landing/**'
      - 'sites/SourceA-landing/**'
      - 'scripts/publish_sourcea_landing_v1.py'
      - 'scripts/build_sourcea_vercel_output_v1.py'
      - 'scripts/sourcea_cf_pages_token_v1.py'
      - 'scripts/sourcea_auth_domains_audit_v1.py'
      - 'data/sourcea-auth-domains-machine-v1.json'
      - '.github/workflows/deploy-sourcea-buyer-surfaces-v1.yml'

permissions:
  contents: read

concurrency:
  group: deploy-sourcea-buyer-surfaces-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-buyer-surfaces:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler@3

      - name: Materialize SourceA CF token (GHA production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "FAIL: CLOUDFLARE_API_TOKEN secret missing — add to GitHub production environment"
            exit 1
          fi
          mkdir -p ~/.sina
          python3 -c "
          import json, os
          from pathlib import Path
          p = Path.home() / '.sina' / 'cf-pages-token-v1.json'
          p.write_text(json.dumps({
            'schema': 'sourcea-cf-pages-token-v1',
            'api_token': os.environ['CLOUDFLARE_API_TOKEN'],
            'account_id': os.environ.get('CLOUDFLARE_ACCOUNT_ID', '0d0b967b77e2e5535455d39ff3dae72c'),
            'zone_name': 'sourcea.com',
            'project': 'sourcea-com',
          }, indent=2) + '\n')
          print('OK cf-pages-token materialized for publish')
          "

      - name: Deploy buyer surfaces (Pages — verify deferred to workflow_run chain)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SOURCEA_PAGES_PROJECT: sourcea-com
        run: |
          set -euo pipefail
          python3 scripts/publish_sourcea_landing_v1.py \
            --backend pages \
            --project sourcea-com \
            --custom-domain \
            --no-inline-verify \
            --skip-recipe \
            --json | tee "${{ runner.temp }}/deploy-buyer-surfaces.json"
          python3 -c "
          import json, sys
          d=json.load(open('${{ runner.temp }}/deploy-buyer-surfaces.json'))
          print(d.get('founder_line') or d.get('error') or d)
          sys.exit(0 if d.get('ok') else 1)
          "

      - name: SourceA auth domains audit (live — app · ca · uk)
        run: |
          set -euo pipefail
          python3 scripts/sourcea_auth_domains_audit_v1.py --mode live --json | tee "${{ runner.temp }}/sourcea-auth-domains-audit.json"
          python3 -c "
          import json, sys
          d=json.load(open('${{ runner.temp }}/sourcea-auth-domains-audit.json'))
          print(d.get('verdict'), 'pass=', d.get('pass_count'), 'fail=', d.get('fail_count'))
          sys.exit(0 if d.get('ok') else 1)
          "

      - name: Upload deploy receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-buyer-surfaces-receipt
          path: ${{ runner.temp }}/deploy-buyer-surfaces.json
          retention-days: 30
