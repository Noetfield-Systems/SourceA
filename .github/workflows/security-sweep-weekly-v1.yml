name: security-sweep-weekly

# Weekly security hygiene — findings → improvement_queue (no report artifacts).
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 0'

permissions:
  contents: read

concurrency:
  group: security-sweep-weekly
  cancel-in-progress: false

jobs:
  security-sweep:
    name: security-sweep
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sweep → improvement_queue
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/gha_security_sweep_v1.py --insert --json
