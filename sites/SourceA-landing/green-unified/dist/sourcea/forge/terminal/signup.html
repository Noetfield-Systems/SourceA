<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Create account · Forge Terminal · SourceA</title>
  <meta name="description" content="Create your Forge Terminal account — workspace and controlled agent execution." />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0c0e12" />
  <link rel="stylesheet" href="/assets/agentrun.css" />
  <link rel="stylesheet" href="/sourcea/sourcea.css" />
  <link rel="stylesheet" href="/sourcea/sourcea-platform-onboarding-v1.css?v=1.4.0" />
</head>
<body class="ar-body sa-v2 sa-platform-onboard" data-sa-page="forge-terminal-signup">
<header class="ar-header sa-header">
  <div class="ar-container ar-header-shell">
    <div class="ar-header-inner sa-po-header-inner">
      <a class="ar-logo" href="/sourcea/forge/terminal">
        <span class="ar-logo-text">Source<span class="ar-logo-run">A</span></span>
        <span class="sa-ws-badge">Forge Terminal</span>
      </a>
      <div class="ar-header-actions">
        <a class="ar-btn ar-btn-ghost ar-btn-sm" href="/sourcea/forge/terminal/signin">Sign in</a>
      </div>
    </div>
  </div>
</header>
<main class="ar-container">
  <nav class="sa-po-steps" aria-label="Onboarding steps"></nav>
  <section class="sa-po-card">
    <h1>Create your Forge Terminal account</h1>
    <p class="ar-lead">Start your project with a real workspace — receipts, quality gates, and workspace on Mac.</p>

    <div class="sa-po-auth-banner" id="sa-po-supabase-banner" hidden>
      <span class="sa-po-supabase-mark">Supabase</span>
      <span id="sa-po-supabase-banner-text"><strong>Account auth</strong> — Google, GitHub, or email &amp; password</span>
    </div>

    <div class="sa-po-oauth-row" id="sa-po-supabase-oauth">
      <button type="button" class="sa-po-oauth sa-po-oauth-google" id="sa-po-google">
        <span class="sa-po-oauth-icon" aria-hidden="true">G</span>
        Continue with Google
      </button>
      <button type="button" class="sa-po-oauth sa-po-oauth-github" id="sa-po-github">
        <span class="sa-po-oauth-icon" aria-hidden="true">⌘</span>
        Continue with GitHub
      </button>
    </div>

    <p class="sa-po-divider" id="sa-po-email-divider">or create with email</p>

    <form id="sa-po-signup-form">
      <label class="sa-po-field">Your name
        <input type="text" id="sa-po-name" class="sa-po-input" required autocomplete="name" placeholder="Alex Chen" />
      </label>
      <label class="sa-po-field">Email
        <input type="email" id="sa-po-email" class="sa-po-input" required autocomplete="email" placeholder="you@agency.com" />
      </label>
      <label class="sa-po-field">Password
        <input type="password" id="sa-po-password" class="sa-po-input" required autocomplete="new-password" placeholder="At least 8 characters" minlength="8" />
      </label>
      <label class="sa-po-field">Confirm password
        <input type="password" id="sa-po-password-confirm" class="sa-po-input" required autocomplete="new-password" placeholder="Repeat password" minlength="8" />
      </label>
      <div class="sa-po-actions">
        <button type="submit" class="ar-btn ar-btn-primary">Create account →</button>
      </div>
    </form>

    <p class="sa-po-switch">Already have an account? <a href="/sourcea/forge/terminal/signin">Sign in</a></p>
    <p class="sa-po-status" id="sa-po-auth-status" hidden></p>
  </section>
</main>
<script src="/sourcea/sourcea-platform-session-v1.js?v=1.4.0"></script>
<script src="/sourcea/sourcea-platform-auth-v1.js?v=1.4.0"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  window.SourceAPlatformSession.mountStepNav(document.querySelector(".sa-po-steps"), "sign-in", { signLabel: "1 · Account" });
  window.SourceAPlatformAuth.bootSignUpPage();
});
</script>
<script src="/sourcea/sourcea-site-pulse-v1.js" defer></script>
<script src="/sourcea/sourcea-site-interact-v1.js" defer></script>
<script src="/sourcea/sourcea-segment-router-v1.js" defer></script>
</body>
</html>
