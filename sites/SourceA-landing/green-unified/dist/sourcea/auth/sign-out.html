<script src="/sourcea/sourcea-platform-auth-v1.js?v=1.5.0"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  var S = window.SourceAPlatformSession;
  Promise.resolve()
    .then(function () { return window.SourceAPlatformAuth.signOutSupabase(); })
    .then(function () {
      if (S) {
        try { localStorage.removeItem("sourcea-platform-session-v1"); } catch (_) {}
      }
      window.location.replace("/auth/sign-in");
    });
});
</script>
