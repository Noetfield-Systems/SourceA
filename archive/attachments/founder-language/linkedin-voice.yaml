schema: founder-linkedin-voice-v1
updated: "2026-06-12"
source_md: noetfield_commercial_positioning__linkedin-profile-hyper-commercial-v4.md
policy: >-
  Public / semi-public copy (LinkedIn, outbound, form row plain English) uses this voice.
  Internal hub jargon never appears in founder-facing or enterprise-facing copy.

headline: "AI Governance & RWA Infrastructure Architect | Pre-Execution Risk & Compliance"

category_line: "We make AI execution impossible to bypass governance."

products:
  - id: trust-brief
    name: Trust Brief
    say: "Executive-ready governance snapshot before execution"
    not: "Trust OS product build"
  - id: evidence-audit
    name: Evidence-Grade Audit Engine
    say: "Tamper-evident verification for AI actions"
    not: "generic AI audit chatbot"
  - id: policy-replay
    name: Policy Replay
    say: "Replay what policy allowed vs what ran"
    not: "debug log dump"
  - id: pre-exec-pack
    name: Pre-Execution Regulatory Pack
    say: "RPAA-safe readiness pack — advisory not payment rails"
    not: "MSB registration substitute"

perimeter:
  say:
    - "Pre-execution governance and compliance advisory"
    - "No custody · no payment initiation · outside RPAA/FINTRAC payment perimeter"
    - "Licensed partners execute settlement — we assess and evidence"
  never:
    - "We move money"
    - "Payment orchestration platform"
    - "Crypto custody"
    - "Guaranteed regulatory approval"

voice_rules:
  - "Short · precise · direct — no essay in form rows or posts"
  - "Evidence before adjectives — name disk path or receipt when claiming shipped"
  - "Three layers: SourceA engine · Noetfield governance product · TrustField commercial delivery"
  - "CAPS from founder = same intent as mixed case (FOUNDER_MSG_NORM)"
  - "LinkedIn = commercial inbound voice · form = permission forks · hub = count only"

form_row_copy:
  subject: "Plain English — one sentence what this row is about"
  case: "Full story on the card — founder should not hunt another chat"
  effect: "What happens logged if you pick X — Maintainer records PICK only"
  banned_in_rows:
    - "§OPEN_QUESTIONS"
    - "EXTERNAL_CRITIC"
    - "Maintainer explains in chat"
    - "616 hero"
    - "Trust OS build"

linkedin_phrases:
  - founder: "pre-execution"
    plain: "Before money or settlement moves — governance gate"
    machine: PRE_EXECUTION_GOVERNANCE
  - founder: "RWA infrastructure"
    plain: "Real-world asset readiness · evidence · policy — not token custody pitch"
    machine: RWA_READINESS_ADVISORY
  - founder: "evidence-grade"
    plain: "Tamper FAIL on camera · receipt logged"
    machine: W1_PROOF_TRACK
  - founder: "governance architect"
    plain: "Design + audit layer — not legal advice"
    machine: GOV_SPECIALIST_LANE
  - founder: "Trust Brief"
    plain: "Named product SKU — Trust Brief"
    machine: TF_TRUST_BRIEF
  - founder: "hub is not a goal"
    plain: "Hub projects disk — building the agentic engine is the goal"
    machine: CONTROL_TRACK
    source: "ENF-01 founder note on form"

scan_order:
  - linkedin-voice.yaml
  - dictionary.yaml
  - forbidden.yaml
  - phrase-corpus.yaml
  - ~/.sina/founder-notes.json

skill: .cursor/skills/founder-linkedin-language/SKILL.md
sync_script: scripts/sync_founder_linkedin_voice_v1.py
