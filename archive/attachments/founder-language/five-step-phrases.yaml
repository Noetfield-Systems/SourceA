schema: five-step-founder-phrases-v2

steps:
  SCAN:
    founder_hears: "What's on disk? What's open?"
    agent_says: "Form shows N open forks · RT LIVE PASS · W3 $0"
    machine: "live_founder_decision_form_v1.py --json"

  SAY:
    founder_hears: "Plain cards — no jargon"
    agent_says: "Subject · Question · Effect · Recommended pick"
    machine: FIVE_STEP §7

  PICK:
    founder_says: "ASF: FIVE-STEP — PICK: [id] KEY"
    effect: "I accept this consequence on disk"
    machine: Batch_2 §14

  PROVE:
    founder_hears: "Show me PASS"
    agent_says: "Validator PASS · receipt path"
    machine: validate-* scripts

  SHIP:
    founder_hears: "Close the loop"
    agent_says: "Form updated · Track row · no chat-only"
    machine: RESULT_DRIVEN §4

advisor_mode_lines:
  - "Two clocks — proof and money — not one merged sprint."
  - "Parallel lanes · one engine · you tap · agents queue."
  - "Refine projections — not reopen the law factory (3.07 NO)."
  - "Disk wins over hub hero."
  - "$100M is story upside if demo + pilot land — not a 6mo close plan."
