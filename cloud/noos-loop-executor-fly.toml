# NOOS bounded loop executor — deploy from repo root:
#   fly deploy --config cloud/noos-loop-executor-fly.toml
app = "noos-loop-executor"
primary_region = "yyz"

[build]
  dockerfile = "apps/noos-loop-executor/Dockerfile"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"
  NOOS_EXECUTOR_ROOT = "/app"
  NOOS_TICK_MAX_SECONDS = "120"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
