name = "sourcea-brain-chat-v1"
main = "src/index.js"
compatibility_date = "2024-06-01"
account_id = "0d0b967b77e2e5535455d39ff3dae72c"

# Route on sourcea.app when DNS is on Cloudflare:
# routes = [{ pattern = "sourcea.app/api/brain/chat/v1", zone_name = "sourcea.app" }]

[ai]
binding = "AI"

# Optional durable trace storage:
# wrangler kv namespace create BRAIN_CHAT_LOGS
# [[kv_namespaces]]
# binding = "BRAIN_CHAT_LOGS"
# id = "<kv_namespace_id>"

# Production default: gate OFF (BRAIN_CORE_GATE_V1_ENABLED=0).
# Staging env enables BRAIN_CORE_GATE_STAGING=1 for dry probes.
# Production enable requires promotion gate + SG verifier — set BRAIN_CORE_GATE_V1_ENABLED=1 only after promote_locked_definitions_v1.py PASS.

[vars]
BRAIN_CORE_GATE_V1_ENABLED = "1"

[env.staging]
name = "sourcea-brain-chat-v1-staging"
vars = { BRAIN_CORE_GATE_STAGING = "1" }
