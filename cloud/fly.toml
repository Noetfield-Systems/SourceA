# SourceA FBE cloud worker — FREE-ONLY posture
# auto_stop + min_machines_running=0 → $0 compute when idle (card may still be required on Fly org)
app = "sourcea-fbe-worker-v1"
primary_region = "yyz"

[build]
  dockerfile = "cloud/Dockerfile.fbe-runner"
  ignorefile = "cloud/.dockerignore"

[env]
  FBE_MODE = "headless"
  PORT = "8080"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
